<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin – Portál poplatků Jesenice</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F0F0F0; font-family: 'Source Sans 3','Segoe UI',Arial,sans-serif; color: #111; }
    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; padding: 9px 12px; border-bottom: 1px solid #E5E7EB; font-size: 13px; }
    th { background: #F9FAFB; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: #6B7280; }
    tr:hover td { background: #FAFAFA; }
    input[type=number] { width: 90px; padding: 5px 8px; border: 1.5px solid #D1D5DB; border-radius: 4px; font-size: 13px; font-family: inherit; }
    input[type=number]:focus { outline: none; border-color: #9B1C1C; }
    input[type=number].changed { border-color: #F59E0B; background: #FFFBEB; }
    input[type=number].saved { border-color: #16A34A; background: #F0FDF4; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const { createClient } = supabase;
const sb = createClient(
  "https://qfepmxkiyuisrdicmvnb.supabase.co",
  "sb_publishable_NMcW9ck5Vn1eS_FRI39sgw_M141ES-K"
);

const C = {
  red: "#9B1C1C", redDark: "#7A1515", redLight: "#FEF2F2", redBorder: "#FECACA",
  gold: "#B45309", goldLight: "#FFFBEB", goldBorder: "#FDE68A",
  bg: "#F0F0F0", card: "#FFFFFF", text: "#111111", textSoft: "#374151",
  muted: "#6B7280", border: "#E5E7EB", borderDark: "#D1D5DB",
  success: "#166534", successLight: "#F0FDF4", successBorder: "#BBF7D0",
  error: "#B91C1C",
};

// ── HELPERS ──────────────────────────────────────────────────────────

function formatCastObce(v) {
  const m = { jesenice:"Jesenice", osnice:"Osnice", zdimerice:"Zdiměřice" };
  return m[v] || v || "—";
}
function formatTyp(v) {
  const m = { rd:"Rodinný dům", byt:"Byt", rekreace_trvala:"Rekr. – trvalý pobyt", rekreace_chata:"Rekr. – chata" };
  return m[v] || v || "—";
}
function formatNadoba(v) { return v ? `${v} l` : "—"; }
function formatCetnost(v) { return v ? `${v}× / rok` : "—"; }
function formatDatum(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleDateString("cs-CZ");
}

// ── UI PRIMITIVES ─────────────────────────────────────────────────────

function Card({ children, style }) {
  return (
    <div style={{
      background: C.card, border: `1px solid ${C.border}`,
      borderRadius: 8, boxShadow: "0 1px 4px rgba(0,0,0,.06)",
      ...style
    }}>{children}</div>
  );
}

function CardHead({ title, sub, action }) {
  return (
    <div style={{ padding: "16px 20px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
      <div>
        <div style={{ fontWeight: 800, fontSize: 15, color: C.text }}>{title}</div>
        {sub && <div style={{ fontSize: 12, color: C.muted, marginTop: 2 }}>{sub}</div>}
      </div>
      {action}
    </div>
  );
}

function Btn({ children, onClick, variant = "primary", disabled, small }) {
  const styles = {
    primary: { background: C.red, color: "#fff", border: "none" },
    secondary: { background: "transparent", color: C.textSoft, border: `1.5px solid ${C.borderDark}` },
    success: { background: "#16A34A", color: "#fff", border: "none" },
    ghost: { background: "transparent", color: C.red, border: "none", textDecoration: "underline" },
  };
  return (
    <button onClick={onClick} disabled={disabled} style={{
      padding: small ? "5px 12px" : "9px 18px",
      borderRadius: 5, fontSize: small ? 12 : 13, fontWeight: 700,
      cursor: disabled ? "not-allowed" : "pointer", fontFamily: "inherit",
      opacity: disabled ? .5 : 1, transition: "opacity .15s",
      ...styles[variant],
    }}>{children}</button>
  );
}

function Badge({ children, color }) {
  const palettes = {
    green:  { bg: "#F0FDF4", text: "#166534", border: "#BBF7D0" },
    gold:   { bg: "#FFFBEB", text: "#B45309", border: "#FDE68A" },
    red:    { bg: "#FEF2F2", text: "#9B1C1C", border: "#FECACA" },
    gray:   { bg: "#F9FAFB", text: "#6B7280", border: "#E5E7EB" },
  };
  const p = palettes[color] || palettes.gray;
  return (
    <span style={{
      background: p.bg, color: p.text, border: `1px solid ${p.border}`,
      borderRadius: 20, padding: "2px 9px", fontSize: 11, fontWeight: 700,
    }}>{children}</span>
  );
}

// ── LOGIN ────────────────────────────────────────────────────────────

function AdminLogin({ onLogin }) {
  const [email, setEmail]   = useState("");
  const [pass,  setPass]    = useState("");
  const [err,   setErr]     = useState(null);
  const [loading, setLoading] = useState(false);

  async function handleLogin() {
    setErr(null); setLoading(true);
    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
      if (error) throw error;
      // Ověř admin whitelist
      const { data: admin, error: adminErr } = await sb
        .from("admin_users").select("email").eq("email", email).single();
      if (adminErr || !admin) throw new Error("Nemáte admin oprávnění.");
      onLogin(data.user);
    } catch (e) {
      setErr(e.message || "Přihlášení selhalo.");
    } finally {
      setLoading(false);
    }
  }

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div style={{ width: "100%", maxWidth: 380 }}>
        {/* Header */}
        <div style={{ textAlign: "center", marginBottom: 28 }}>
          <svg width="38" height="44" viewBox="0 0 42 50" fill="none" style={{ margin: "0 auto 10px", display: "block" }}>
            <path d="M2 2H40V32Q40 48 21 50Q2 48 2 32Z" fill={C.red} stroke={C.redDark} strokeWidth="1.5"/>
            <text x="21" y="32" textAnchor="middle" fontSize="20" fill="#F5C132" fontFamily="serif">⚜</text>
          </svg>
          <div style={{ fontSize: 11, color: C.muted, fontWeight: 600, letterSpacing: ".08em", textTransform: "uppercase" }}>Město Jesenice</div>
          <div style={{ fontSize: 22, fontWeight: 800, letterSpacing: "-.2px" }}>ADMIN PORTÁL</div>
          <div style={{ fontSize: 13, color: C.muted, marginTop: 4 }}>Správa místních poplatků</div>
        </div>

        <Card style={{ padding: "24px 20px" }}>
          <div style={{ marginBottom: 14 }}>
            <label style={{ display: "block", fontSize: 12, fontWeight: 700, marginBottom: 5 }}>E-mail</label>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)}
              placeholder="admin@mujesenice.cz" autoComplete="email"
              onKeyDown={e => e.key === "Enter" && handleLogin()}
              style={{ width: "100%", padding: "9px 11px", border: `1.5px solid ${C.border}`, borderRadius: 5, fontSize: 14, fontFamily: "inherit" }}/>
          </div>
          <div style={{ marginBottom: 16 }}>
            <label style={{ display: "block", fontSize: 12, fontWeight: 700, marginBottom: 5 }}>Heslo</label>
            <input type="password" value={pass} onChange={e => setPass(e.target.value)}
              placeholder="••••••••" autoComplete="current-password"
              onKeyDown={e => e.key === "Enter" && handleLogin()}
              style={{ width: "100%", padding: "9px 11px", border: `1.5px solid ${C.border}`, borderRadius: 5, fontSize: 14, fontFamily: "inherit" }}/>
          </div>
          {err && <div style={{ background: C.redLight, border: `1px solid ${C.redBorder}`, borderRadius: 5, padding: "9px 12px", marginBottom: 14, fontSize: 13, color: C.error }}>⚠ {err}</div>}
          <Btn onClick={handleLogin} disabled={loading}>
            {loading ? "Přihlašuji…" : "→ Přihlásit se"}
          </Btn>
        </Card>
      </div>
    </div>
  );
}

// ── SAZBY EDITOR ────────────────────────────────────────────────────

const ODPAD_ROWS = [
  { key: "80_52",           label: "80 l — 52× ročně" },
  { key: "80_26",           label: "80 l — 26× ročně" },
  { key: "120_52",          label: "120 l — 52× ročně" },
  { key: "120_26",          label: "120 l — 26× ročně" },
  { key: "240_52",          label: "240 l — 52× ročně" },
  { key: "240_26",          label: "240 l — 26× ročně" },
  { key: "1100_52",         label: "1100 l — 52× ročně" },
  { key: "1100_104",        label: "1100 l — 104× ročně" },
  { key: "rekreace_trvala", label: "Rekreace – trvalý pobyt" },
  { key: "rekreace_chata",  label: "Rekreace – chata" },
];
const PSI_ROWS = [
  { key: "dum_1", label: "RD — 1 pes" },   { key: "dum_2", label: "RD — 2 psi" },
  { key: "dum_3", label: "RD — 3 psi" },   { key: "dum_4", label: "RD — 4 psi" },
  { key: "dum_5", label: "RD — 5 psů" },
  { key: "byt_1", label: "Byt — 1 pes" },  { key: "byt_2", label: "Byt — 2 psi" },
  { key: "byt_3", label: "Byt — 3 psi" },  { key: "byt_4", label: "Byt — 4 psi" },
  { key: "byt_5", label: "Byt — 5 psů" },
  { key: "senior_1", label: "Senior 65+ — 1 pes" }, { key: "senior_2", label: "Senior 65+ — 2 psi" },
  { key: "senior_3", label: "Senior 65+ — 3 psi" }, { key: "senior_4", label: "Senior 65+ — 4 psi" },
  { key: "senior_5", label: "Senior 65+ — 5 psů" },
];
const BIO_ROWS = [
  { key: "120", label: "Nádoba 120 l" },
  { key: "240", label: "Nádoba 240 l" },
];

function RateRow({ feeType, rowDef, year, dbRates, onChange, savedKeys }) {
  const dbRow = dbRates.find(r => r.fee_type === feeType && r.key === rowDef.key);
  const val = dbRow ? String(dbRow.amount) : "";
  const [local, setLocal] = useState(val);
  const isDirty = local !== val;
  const isSaved = savedKeys.has(`${feeType}:${rowDef.key}`);

  useEffect(() => { setLocal(val); }, [val]);

  return (
    <tr>
      <td>{rowDef.label}</td>
      <td>
        <input
          type="number" value={local} min="0"
          className={isSaved ? "saved" : isDirty ? "changed" : ""}
          onChange={e => { setLocal(e.target.value); onChange(feeType, rowDef.key, e.target.value); }}
        />
      </td>
      <td style={{ color: C.muted }}>Kč</td>
      <td>
        {isDirty && <Badge color="gold">Neuloženo</Badge>}
        {isSaved && !isDirty && <Badge color="green">✓ Uloženo</Badge>}
      </td>
    </tr>
  );
}

function RatesPanel({ year, dbRates, onRefresh }) {
  const [changes, setChanges] = useState({});
  const [saving, setSaving] = useState(false);
  const [savedKeys, setSavedKeys] = useState(new Set());
  const [error, setError] = useState(null);
  const dirtyCount = Object.keys(changes).length;

  function handleChange(feeType, key, value) {
    setChanges(p => ({ ...p, [`${feeType}:${key}`]: { fee_type: feeType, key, amount: value, year } }));
  }

  async function saveAll() {
    setSaving(true); setError(null);
    try {
      const rows = Object.values(changes).map(c => ({
        year: c.year, fee_type: c.fee_type, key: c.key, amount: parseFloat(c.amount) || 0,
      }));
      const { error: err } = await sb.from("fee_rates").upsert(rows, { onConflict: "year,fee_type,key" });
      if (err) throw err;
      const newSaved = new Set([...savedKeys, ...Object.keys(changes)]);
      setSavedKeys(newSaved);
      setChanges({});
      await onRefresh();
    } catch (e) {
      setError(e.message);
    } finally {
      setSaving(false);
    }
  }

  const sections = [
    { title: "🗑 Komunální odpad", feeType: "odpad", rows: ODPAD_ROWS },
    { title: "🐕 Poplatek za psy", feeType: "pes",   rows: PSI_ROWS },
    { title: "🌿 Bioodpad",        feeType: "bio",    rows: BIO_ROWS },
  ];

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div>
          <div style={{ fontWeight: 800, fontSize: 16 }}>Sazby {year}</div>
          <div style={{ fontSize: 12, color: C.muted }}>
            {dirtyCount > 0 ? <span style={{ color: C.gold, fontWeight: 600 }}>⚠ {dirtyCount} neuložených změn</span> : "Vše uloženo"}
          </div>
        </div>
        <Btn onClick={saveAll} disabled={saving || dirtyCount === 0} variant={dirtyCount > 0 ? "primary" : "secondary"}>
          {saving ? "Ukládám…" : `💾 Uložit změny${dirtyCount > 0 ? ` (${dirtyCount})` : ""}`}
        </Btn>
      </div>

      {error && <div style={{ background: C.redLight, border: `1px solid ${C.redBorder}`, borderRadius: 5, padding: "10px 13px", marginBottom: 14, fontSize: 13, color: C.error }}>⚠ {error}</div>}

      {sections.map(sec => (
        <Card key={sec.feeType} style={{ marginBottom: 16, overflow: "hidden" }}>
          <div style={{ padding: "12px 16px", background: "#F9FAFB", borderBottom: `1px solid ${C.border}`, fontWeight: 700, fontSize: 13 }}>
            {sec.title}
          </div>
          <table>
            <thead><tr><th style={{ width: "55%" }}>Varianta</th><th>Částka</th><th></th><th>Stav</th></tr></thead>
            <tbody>
              {sec.rows.map(row => (
                <RateRow key={row.key} feeType={sec.feeType} rowDef={row} year={year}
                  dbRates={dbRates} onChange={handleChange} savedKeys={savedKeys} />
              ))}
            </tbody>
          </table>
        </Card>
      ))}
    </div>
  );
}

// ── KOPÍROVAT ROK ────────────────────────────────────────────────────

function CopyYearPanel({ years, onRefresh }) {
  const [fromYear, setFromYear] = useState(years[0] || 2026);
  const [toYear,   setToYear]   = useState((years[0] || 2026) + 1);
  const [loading,  setLoading]  = useState(false);
  const [msg,      setMsg]      = useState(null);

  async function handleCopy() {
    setLoading(true); setMsg(null);
    try {
      const { data: rows, error } = await sb.from("fee_rates").select("*").eq("year", fromYear);
      if (error) throw error;
      const newRows = rows.map(r => ({ year: toYear, fee_type: r.fee_type, key: r.key, amount: r.amount }));
      const { error: insErr } = await sb.from("fee_rates").upsert(newRows, { onConflict: "year,fee_type,key" });
      if (insErr) throw insErr;
      setMsg({ ok: true, text: `Sazby roku ${fromYear} zkopírovány do roku ${toYear}.` });
      await onRefresh();
    } catch (e) {
      setMsg({ ok: false, text: e.message });
    } finally {
      setLoading(false);
    }
  }

  return (
    <Card style={{ padding: "16px 20px", display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
      <span style={{ fontSize: 13, fontWeight: 700 }}>Zkopírovat sazby:</span>
      <select value={fromYear} onChange={e => setFromYear(Number(e.target.value))}
        style={{ padding: "6px 10px", border: `1.5px solid ${C.border}`, borderRadius: 5, fontSize: 13, fontFamily: "inherit" }}>
        {years.map(y => <option key={y} value={y}>{y}</option>)}
      </select>
      <span style={{ fontSize: 13, color: C.muted }}>→ rok</span>
      <input type="number" value={toYear} onChange={e => setToYear(Number(e.target.value))}
        style={{ width: 80, padding: "6px 10px", border: `1.5px solid ${C.border}`, borderRadius: 5, fontSize: 13, fontFamily: "inherit" }}/>
      <Btn onClick={handleCopy} disabled={loading} small>
        {loading ? "Kopíruji…" : "Kopírovat"}
      </Btn>
      {msg && (
        <span style={{ fontSize: 12, color: msg.ok ? C.success : C.error, fontWeight: 600 }}>
          {msg.ok ? "✓" : "⚠"} {msg.text}
        </span>
      )}
    </Card>
  );
}

      <Card style={{ overflow: "hidden" }}>

              <th>Typ</th>

// ── STATS ────────────────────────────────────────────────────────────

// ── APP ──────────────────────────────────────────────────────────────

function App() {
  const [user,       setUser]       = useState(null);
  const [tab,        setTab]        = useState("sazby");
  const [year,       setYear]       = useState(2026);
  const [years,      setYears]      = useState([2026]);
  const [dbRates,    setDbRates]    = useState([]);
  const [properties, setProperties] = useState([]);
  const [loading,    setLoading]    = useState(false);

  useEffect(() => {
    if (!user) return;
    loadAll();
  }, [user]);

  async function loadAll() {
    setLoading(true);
    try {
      // Načti sazby
      const { data: rates } = await sb.from("fee_rates").select("*").order("year,fee_type,key");
      setDbRates(rates || []);
      const uniqueYears = [...new Set((rates || []).map(r => r.year))].sort((a,b) => b-a);
      if (uniqueYears.length) { setYears(uniqueYears); setYear(uniqueYears[0]); }

      // Načti nemovitosti s profily a remindery (JOIN přes view není možný z frontend,
      // takže načteme properties + reminders a e-maily z profiles view)
      const { data: props } = await sb
        .from("properties")
        .select("*, reminders(reminder_date, extra_count)")
        .order("created_at", { ascending: false });

      // Načti e-maily přes auth.users není dostupné z anon key →
      // používáme profiles tabulku
      const { data: profiles } = await sb.from("profiles").select("id, typ_subjektu, nazev_svj");

      // Připoj typ_subjektu k properties
      const profileMap = Object.fromEntries((profiles || []).map(p => [p.id, p]));
      const enriched = (props || []).map(p => ({
        ...p,
        reminder_date: p.reminders?.[0]?.reminder_date || null,
        extra_count:   p.reminders?.[0]?.extra_count   || 0,
        typ_subjektu:  profileMap[p.user_id]?.typ_subjektu || null,
      }));
      setProperties(enriched);
    } finally {
      setLoading(false);
    }
  }

  const ratesForYear = dbRates.filter(r => r.year === year);
  const bioCount   = properties.filter(p => p.bioodpad).length;
  const psyCount   = properties.reduce((s, p) => s + (p.pocet_psu || 0), 0);
  const svjCount   = properties.filter(p => p.typ_subjektu === "svj").length;

  const tabs = [
    { id: "sazby",      label: "💰 Sazby" },
    { id: "registrace", label: "🏠 Registrace" },
  ];

  if (!user) return <AdminLogin onLogin={setUser} />;

  return (
    <div style={{ minHeight: "100vh", background: C.bg }}>

      {/* Top bar */}
      <div style={{ background: C.red, padding: "0 24px", display: "flex", alignItems: "center", justifyContent: "space-between", height: 52 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <svg width="24" height="28" viewBox="0 0 42 50" fill="none">
            <path d="M2 2H40V32Q40 48 21 50Q2 48 2 32Z" fill="rgba(255,255,255,.25)" stroke="rgba(255,255,255,.5)" strokeWidth="1.5"/>
            <text x="21" y="32" textAnchor="middle" fontSize="20" fill="#F5C132" fontFamily="serif">⚜</text>
          </svg>
          <span style={{ color: "#fff", fontWeight: 800, fontSize: 14, letterSpacing: ".03em", textTransform: "uppercase" }}>
            Jesenice — Admin
          </span>
          <span style={{ background: "#F5C132", color: C.text, fontSize: 10, fontWeight: 800, padding: "2px 7px", borderRadius: 3 }}>BETA</span>
        </div>
        <button onClick={() => sb.auth.signOut().then(() => setUser(null))} style={{
          background: "rgba(255,255,255,.15)", border: "none", color: "#fff",
          padding: "5px 12px", borderRadius: 4, fontSize: 12, fontWeight: 600,
          cursor: "pointer", fontFamily: "inherit",
        }}>
          Odhlásit
        </button>
      </div>

      <div style={{ maxWidth: 1100, margin: "0 auto", padding: "20px 20px 40px" }}>

        {/* Stat boxes */}
        {!loading && (
          <div style={{ display: "flex", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
            <StatBox label="Registrací celkem" value={properties.length} sub="nemovitostí" />
            <StatBox label="Bioodpad" value={bioCount} sub={`${Math.round(bioCount/Math.max(properties.length,1)*100)} %`} color="#166534" />
            <StatBox label="Psi celkem" value={psyCount} sub="registrovaných" color="#B45309" />
            <StatBox label="SVJ" value={svjCount} sub="správců budov" color="#1D4ED8" />
          </div>
        )}

        {/* Tabs */}
        <div style={{ display: "flex", gap: 4, marginBottom: 20, borderBottom: `2px solid ${C.border}`, paddingBottom: 0 }}>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              padding: "9px 18px", fontSize: 13, fontWeight: 700,
              border: "none", background: "none", cursor: "pointer", fontFamily: "inherit",
              borderBottom: tab === t.id ? `3px solid ${C.red}` : "3px solid transparent",
              color: tab === t.id ? C.red : C.textSoft,
              marginBottom: -2,
            }}>{t.label}</button>
          ))}
        </div>

        {loading && <div style={{ textAlign: "center", padding: 40, color: C.muted }}>Načítám data…</div>}

        {!loading && tab === "sazby" && (
          <>
            {/* Výběr roku + kopírování */}
            <div style={{ display: "flex", gap: 12, marginBottom: 16, alignItems: "center", flexWrap: "wrap" }}>
              <div style={{ fontWeight: 700, fontSize: 13 }}>Rok:</div>
              {years.map(y => (
                <button key={y} onClick={() => setYear(y)} style={{
                  padding: "5px 14px", borderRadius: 20, fontSize: 12, fontWeight: 700,
                  border: `2px solid ${y === year ? C.red : C.border}`,
                  background: y === year ? C.redLight : "#fff",
                  color: y === year ? C.red : C.textSoft,
                  cursor: "pointer", fontFamily: "inherit",
                }}>{y}</button>
              ))}
            </div>
            <div style={{ marginBottom: 20 }}>
              <CopyYearPanel years={years} onRefresh={loadAll} />
            </div>
            <RatesPanel key={year} year={year} dbRates={ratesForYear} onRefresh={loadAll} />
          </>
        )}

        {!loading && tab === "registrace" && (
          <RegistracePanel properties={properties} />
        )}

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
